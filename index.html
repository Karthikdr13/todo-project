<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="todo-app">
      <header class="app-header">
        <h1><span class="header-icon">📋</span> Task Manager</h1>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark/light theme">
          <span class="toggle-icon icon-sun">☀️</span>
          <span class="toggle-icon icon-moon">🌙</span>
          <span class="toggle-knob"></span>
        </button>
      </header>

      <form id="todo-form" class="todo-form">
        <input
          id="todo-input"
          type="text"
          placeholder="✏️ What needs to be done?"
          aria-label="Todo input"
          required
        />
        <div class="duration-inputs" aria-label="Optional duration">
          <input
            id="todo-hours"
            type="number"
            placeholder="Hrs"
            aria-label="Duration hours"
            min="0"
            step="1"
          />
          <span class="duration-separator">:</span>
          <input
            id="todo-minutes"
            type="number"
            placeholder="Min"
            aria-label="Duration minutes"
            min="0"
            max="59"
            step="1"
          />
        </div>
        <button type="submit">➕ Add</button>
      </form>

      <div class="section-header">
        <span class="section-icon">🎯</span>
        <span>Active Tasks</span>
      </div>
      <ul id="todo-list" class="todo-list"></ul>

      <section class="finished-section">
        <div class="finished-header">
          <h2><span class="header-icon">✅</span> Completed</h2>
          <button id="clear-finished" type="button">🗑️ Clear All</button>
        </div>
        <ul id="finished-list" class="todo-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
